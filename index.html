        const Icon = ({ name, className = "" }) => {
            if (name === 'check') return (
                <svg className={className} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            );
            if (name === 'x') return (
                <svg className={className} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            );
            return null;
        };

        const LucideIcon = ({ name, size = 20, className = "" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [view, setView] = useState('menu'); 
            const [currentUnit, setCurrentUnit] = useState(null);
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isCompleted, setIsCompleted] = useState(false);
            const [showFeedback, setShowFeedback] = useState(false);

            useEffect(() => {
                if (currentUnit && (view === 'quiz' || view === 'results')) {
                    localStorage.setItem(`accounting_study_hub_progress_${currentUnit}`, JSON.stringify({
                        unit: currentUnit,
                        questions,
                        currentIndex,
                        answers,
                        isCompleted,
                        showFeedback
                    }));
                }
            }, [view, currentUnit, questions, currentIndex, answers, isCompleted, showFeedback]);

            const handleUnitSelect = (unitId) => {
                const saved = localStorage.getItem(`accounting_study_hub_progress_${unitId}`);
                if (saved) {
                    try {
                        const parsed = JSON.parse(saved);
                        if (parsed.unit && !parsed.isCompleted && parsed.questions && parsed.questions.length > 0) {
                            const resume = window.confirm(`Resume previous session for ${unitId.toUpperCase()}?`);
                            if (resume) {
                                setCurrentUnit(unitId);
                                setQuestions(parsed.questions);
                                setCurrentIndex(parsed.currentIndex);
                                setAnswers(parsed.answers || {});
                                setShowFeedback(parsed.showFeedback || false);
                                setIsCompleted(false);
                                setView('quiz');
                                return;
                            }
                        }
                    } catch (e) {
                        localStorage.removeItem(`accounting_study_hub_progress_${unitId}`);
                    }
                }
                startQuiz(unitId);
            };

            const startQuiz = (unitKey) => {
                const rawQuestions = QUESTION_DATA[unitKey] || [];
                const shuffledQuestions = shuffleArray(rawQuestions).map(q => ({
                    ...q,
                    shuffledOptions: shuffleArray(q.options)
                }));
                
                setCurrentUnit(unitKey);
                setQuestions(shuffledQuestions);
                setCurrentIndex(0);
                setAnswers({});
                setIsCompleted(false);
                setShowFeedback(false);
                setView('quiz');
                localStorage.removeItem(`accounting_study_hub_progress_${unitKey}`);
            };

            const handleAnswer = (option) => {
                if (showFeedback) return; 
                setAnswers(prev => ({ ...prev, [currentIndex]: option }));
                setShowFeedback(true);
            };

            const nextQuestion = () => {
                if (currentIndex < questions.length - 1) {
                    setShowFeedback(false);
                    setCurrentIndex(prev => prev + 1);
                } else {
                    setIsCompleted(true);
                    setView('results');
                }
            };

            const prevQuestion = () => {
                if (currentIndex > 0) {
                    const hasAnswer = !!answers[currentIndex - 1];
                    setShowFeedback(hasAnswer);
                    setCurrentIndex(prev => prev - 1);
                }
            };

            const goToMenu = () => {
                setView('menu');
            };

            const calculateScore = () => {
                let correct = 0;
                questions.forEach((q, idx) => {
                    if (answers[idx] === q.answer) correct++;
                });
                return correct;
            };

                                { id: 'unit2', title: 'Unit 2: Revenue Recognition', count: 26, icon: 'dollar-sign', color: 'bg-emerald-600' },

                                    </div>
                                </button>
                            ))}
                        </div>
                    </div>
                );
            }

            if (view === 'quiz') {
                const q = questions[currentIndex];
                if (!q) return <div className="p-8 text-center">Loading session...</div>;

                return (
                    <div className="max-w-3xl mx-auto p-4 md:p-8">

                                <LucideIcon name="home" size={18} className="mr-2" /> Menu
                            </button>

                                Question {currentIndex + 1} of {questions.length}
                            </div>
                        </div>

                        <div className="mb-4 bg-gray-200 h-2 rounded-full overflow-hidden text-left">
                            <div 
                                className="bg-blue-500 h-full transition-all duration-300" 
                                style={{ width: `${((currentIndex + 1) / questions.length) * 100}%` }}
                            />
                        </div>

                        <div key={`${currentUnit}-${currentIndex}`} className="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 mb-6 text-left">
                            <h3 className="text-lg font-normal text-gray-800 mb-8 pre-line leading-relaxed">
                                {q.question}
                            </h3>

                            <div className="space-y-3">
                                {(q.shuffledOptions || q.options).map((opt, i) => {
                                    const isSelected = answers[currentIndex] === opt;
                                    const isCorrect = opt === q.answer;
                                    
                                    let buttonStyle = 'bg-white border-gray-200 hover:border-blue-300 hover:bg-gray-50';
                                    let circleStyle = 'bg-gray-100 text-gray-500';

                                    if (showFeedback) {
                                        if (isCorrect) {
                                            buttonStyle = 'bg-emerald-50 border-emerald-500 ring-1 ring-emerald-500';
                                            circleStyle = 'bg-emerald-500 text-white';
                                        } else if (isSelected && !isCorrect) {
                                            buttonStyle = 'bg-red-50 border-red-500 ring-1 ring-red-500';
                                            circleStyle = 'bg-red-500 text-white';
                                        } else {
                                            buttonStyle = 'bg-white border-gray-100 opacity-60';
                                        }
                                    } else if (isSelected) {
                                        buttonStyle = 'bg-blue-50 border-blue-500 ring-1 ring-blue-500';
                                        circleStyle = 'bg-blue-500 text-white';
                                    }

                                    return (
                                        <button
                                            key={i}
                                            onClick={() => handleAnswer(opt)}
                                            disabled={showFeedback}
                                            className={`w-full p-3 text-left text-base font-normal rounded-lg border transition-all ${buttonStyle}`}
                                        >
                                            <div className="flex items-start">
                                                <span className={`w-6 h-6 rounded-full flex items-center justify-center mr-3 text-xs shrink-0 ${circleStyle}`}>
                                                    {showFeedback && isCorrect ? <Icon name="check" /> : 
                                                     showFeedback && isSelected && !isCorrect ? <Icon name="x" /> : 
                                                     String.fromCharCode(65 + i)}
                                                </span>
                                                <span className="flex-1">{opt}</span>
                                            </div>
                                        </button>
                                    );
                                })}
                            </div>

                            {showFeedback && (
                                <div className={`mt-6 p-4 rounded-lg flex items-center feedback-enter ${
                                    answers[currentIndex] === q.answer ? 'bg-emerald-50 text-emerald-800' : 'bg-red-50 text-red-800'
                                }`}>
                                    <LucideIcon 
                                        name={answers[currentIndex] === q.answer ? "check-circle" : "alert-circle"} 
                                        className="mr-3 shrink-0" 
                                    />
                                    <p className="font-normal text-sm">
                                        {answers[currentIndex] === q.answer 
                                            ? "Correct!" 
                                            : `Incorrect. The correct answer is: ${q.answer}`}
                                    </p>
                                </div>
                            )}
                        </div>

                        <div className="flex justify-between items-center">
                            <button
                                onClick={prevQuestion}
                                disabled={currentIndex === 0}
                                className={`flex items-center px-6 py-2 rounded-lg font-normal transition-colors ${
                                    currentIndex === 0 ? 'text-gray-300 cursor-not-allowed' : 'text-gray-600 hover:bg-white hover:shadow-sm border border-transparent hover:border-gray-200'
                                }`}
                            >
                                <LucideIcon name="chevron-left" size={20} className="mr-1" /> Previous
                            </button>
                            <button
                                onClick={nextQuestion}
                                disabled={!answers[currentIndex]}
                                className={`flex items-center px-8 py-3 rounded-lg font-normal transition-all shadow-sm ${
                                    !answers[currentIndex]
                                        ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                                        : 'bg-blue-600 text-white hover:bg-blue-700 active:transform active:scale-95'
                                }`}
                            >
                                {currentIndex === questions.length - 1 ? 'Finish Quiz' : 'Next Question'}
                                <LucideIcon name="chevron-right" size={20} className="ml-1" />
                            </button>
                        </div>
                    </div>

            }

            if (view === 'results') {

                return (

                                </div>

                                <p className="text-blue-100 font-normal">You've finished {currentUnit?.toUpperCase()}</p>
                            </div>
                            
                            <div className="p-8 md:p-12">
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                                    <div className="text-center p-6 bg-gray-50 rounded-2xl">
                                        <p className="text-gray-500 text-sm mb-1 font-normal uppercase tracking-wider">Score</p>
                                        <p className="text-4xl font-bold text-gray-800 font-normal">{score} / {questions.length}</p>
                                    </div>
                                    <div className="text-center p-6 bg-gray-50 rounded-2xl">
                                        <p className="text-gray-500 text-sm mb-1 font-normal uppercase tracking-wider">Accuracy</p>
                                        <p className="text-4xl font-bold text-gray-800 font-normal">{percentage}%</p>
                                    </div>
                                    <div className="text-center p-6 bg-gray-50 rounded-2xl">
                                        <p className="text-gray-500 text-sm mb-1 font-normal uppercase tracking-wider">Status</p>
                                        <p className={`text-4xl font-bold font-normal ${percentage >= 70 ? 'text-emerald-600' : 'text-amber-600'}`}>
                                            {percentage >= 70 ? 'Pass' : 'Review'}
                                        </p>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <h3 className="text-xl font-semibold text-gray-800 font-normal">Review Answers</h3>
                                    <div className="space-y-4 max-h-[500px] overflow-y-auto pr-2">
                                        {questions.map((q, idx) => {
                                            const isCorrect = answers[idx] === q.answer;
                                            return (
                                                <div key={idx} className={`p-5 rounded-xl border ${isCorrect ? 'border-emerald-100 bg-emerald-50/30' : 'border-red-100 bg-red-50/30'} text-left`}>
                                                    <div className="flex justify-between items-start mb-2">
                                                        <span className="text-xs font-bold text-gray-400 uppercase">Question {idx + 1}</span>
                                                        {isCorrect ? <Icon name="check" className="text-emerald-500" /> : <Icon name="x" className="text-red-500" />}
                                                    </div>
                                                    <p className="text-gray-800 mb-3 pre-line font-normal">{q.question}</p>
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                                                        <div className="font-normal">
                                                            <span className="text-gray-500 block mb-1 uppercase text-[10px]">Your Answer:</span>
                                                            <span className={isCorrect ? "text-emerald-700" : "text-red-700"}>{answers[idx] || "No answer"}</span>
                                                        </div>
                                                        {!isCorrect && (
                                                            <div className="font-normal">
                                                                <span className="text-gray-500 block mb-1 uppercase text-[10px]">Correct Answer:</span>
                                                                <span className="text-emerald-700">{q.answer}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                <div className="mt-12 flex flex-col md:flex-row gap-4 justify-center">
                                    <button
                                        onClick={() => startQuiz(currentUnit)}
                                        className="flex items-center justify-center px-8 py-3 bg-blue-600 text-white rounded-xl hover:bg-blue-700 transition-colors shadow-sm font-normal"
                                    >
                                        <LucideIcon name="refresh-cw" size={18} className="mr-2" /> Try Again
                                    </button>
                                    <button
                                        onClick={goToMenu}
                                        className="flex items-center justify-center px-8 py-3 bg-white text-gray-700 border border-gray-200 rounded-xl hover:bg-gray-50 transition-colors font-normal"
                                    >
                                        <LucideIcon name="home" size={18} className="mr-2" /> Back to Menu
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }
            return null;
        };

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
